<!DOCTYPE html>
<html>
<head>
    <title>Face Recognition System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background: #121212; color: #e0e0e0; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: #00ff88; text-transform: uppercase; letter-spacing: 2px; }
        
        .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .video-box { background: #1e1e1e; padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        .video-box h3 { margin-top: 0; color: #888; font-size: 14px; }
        
        video, img { width: 100%; max-width: 540px; border-radius: 8px; background: #000; min-height: 400px; }
        #processed-stream { border: 2px solid #00ff88; box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }

        .status-panel { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-top: 20px; border-left: 5px solid #00ff88; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 15px; }
        .stat-card { background: #252525; padding: 15px; border-radius: 8px; text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; color: #00ff88; display: block; }
        .stat-label { font-size: 12px; color: #888; text-transform: uppercase; }

        .controls { text-align: center; margin-top: 30px; display: flex; justify-content: center; gap: 15px; }
        button { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 16px; }
        .btn-start { background: #00ff88; color: #000; }
        .btn-reset { background: #ff4444; color: #fff; }
        .btn-confirm { background: #0088ff; color: #fff; display: none; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        button:disabled { background: #444; cursor: not-allowed; transform: none; }

        #loading-overlay { display: none; color: #00ff88; font-style: italic; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎥 AI Face Tracking & ID</h1>

        <div class="main-layout">
            <div class="video-box">
                <h3>LIVE CAMERA (INPUT)</h3>
                <video id="webcam" autoplay playsinline muted></video>
            </div>
            <div class="video-box">
                <h3>AI PROCESSED (OUTPUT)</h3>
                <img id="processed-stream" src="" alt="Waiting for start...">
            </div>
        </div>

        <div class="status-panel">
            <div id="status-text"><strong>Status:</strong> Ready to start.</div>
            <div id="loading-overlay">⏳ Processing recognition, please wait...</div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label">Active Tracks</span>
                    <span class="stat-value" id="track-cnt">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Confidence</span>
                    <span class="stat-value" id="conf-val">0.00</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Server Time</span>
                    <span class="stat-value" id="srv-time">--:--:--</span>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="btn-start" class="btn-start">START CAMERA</button>
            <button id="btn-confirm" class="btn-confirm">CONFIRM & RECOGNIZE</button>
            <button id="btn-reset" class="btn-reset">RESET SYSTEM</button>
        </div>

        <canvas id="hidden-canvas" style="display:none;"></canvas>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('hidden-canvas');
        const processedImg = document.getElementById('processed-stream');
        const btnStart = document.getElementById('btn-start');
        const btnConfirm = document.getElementById('btn-confirm');
        const btnReset = document.getElementById('btn-reset');
        
        let isRunning = false;
        let streamInterval = null;

        // 1. Khởi động Camera
        btnStart.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                isRunning = true;
                btnStart.disabled = true;
                btnStart.innerText = "RUNNING...";
                startProcessing();
            } catch (err) {
                alert("Error accessing webcam: " + err);
            }
        });

        // 2. Gửi Frame liên tục
        function startProcessing() {
            const context = canvas.getContext('2d');
            canvas.width = 640;
            canvas.height = 480;

            streamInterval = setInterval(async () => {
                if (!isRunning) return;

                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                const base64Image = canvas.toDataURL('image/jpeg');

                try {
                    const response = await fetch('/process_frame', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: base64Image })
                    });
                    
                    const data = await response.json();

                    if (data.processed_image) {
                        processedImg.src = data.processed_image;
                    }

                    document.getElementById('track-cnt').textContent = data.total_tracks;
                    if (data.face_info) {
                        document.getElementById('conf-val').textContent = data.face_info.confidence.toFixed(2);
                    }

                    // Nếu backend báo dừng (phát hiện mặt đẹp để nhận diện)
                    if (data.should_stop) {
                        stopStreaming();
                        document.getElementById('status-text').innerHTML = "<strong>Status:</strong> Target Acquired! Click Confirm to recognize.";
                        btnConfirm.style.display = "inline-block";
                    }

                } catch (e) {
                    console.error("Processing error:", e);
                }
            }, 100); // ~7 FPS để đảm bảo độ trễ thấp
        }

        function stopStreaming() {
            isRunning = false;
        }

        // 3. Nút Xác nhận (Upload & Recognize)
        btnConfirm.addEventListener('click', async () => {
            btnConfirm.disabled = true;
            document.getElementById('loading-overlay').style.display = "block";

            try {
                const response = await fetch('/continue_recognition', { method: 'POST' });
                const result = await response.json();

                if (result.success) {
                    alert(`Recognized: ${result.message}\nUser ID: ${result.user_id}`);
                } else {
                    alert("Recognition failed: " + result.error);
                }
            } catch (e) {
                alert("Network error");
            } finally {
                document.getElementById('loading-overlay').style.display = "none";
                btnConfirm.disabled = false;
            }
        });

        // 4. Reset hệ thống
        btnReset.addEventListener('click', async () => {
            await fetch('/reset_detection', { method: 'POST' });
            location.reload();
        });

        // Cập nhật stats phụ (Time)
        setInterval(async () => {
            try {
                const res = await fetch('/stats');
                const data = await res.json();
                document.getElementById('srv-time').textContent = data.current_time.split(' ')[0];
            } catch(e) {}
        }, 1000);
    </script>
</body>
</html>
