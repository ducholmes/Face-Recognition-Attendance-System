services:
  api:
    build: .
    image: face-recognition
    command: uvicorn API.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
  face:
    build: .
    image: face-recognition
    command: python run.py
    environment:
      - API_BASE_URL=api:8000
    ports:
      - "5000:5000"
    depends_on:
      - api
    
  app:
    build: .
    image: face-recognition
    command: uvicorn face_attendance_app.main:app --host 0.0.0.0 --port 5001
    environment:
      - API_BASE_URL=http://api:8000
      - CLIENT_BASE_URL=http://face:5000
    ports:
      - "5001:5001"
    depends_on:
      - face
      - api
  
  redis:
    image: redis:alpine
    container_name: redis_broker
    ports:
      - "6379:6379"

  worker:
    image: face-recognition
    container_name: celery_worker
    command: celery -A API.utils.tasks worker --loglevel=info
    depends_on:
      - redis
  
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - face
      - app
